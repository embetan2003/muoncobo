<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bãi Triều</title>
    <link rel="icon" href="logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #00f2fe;
            --rose-color: #ff4d6d;
            --rose-glow: rgba(255, 77, 109, 0.5);
            --glass-bg: rgba(0, 0, 0, 0);
            --warning-color: #ffde59;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        #welcome-text {
            color: var(--primary-color);
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            font-weight: 800;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            animation: heartBeat 2s infinite;
        }

        @keyframes heartBeat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .glass-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1300px;
            height: 92vh;
            background: var(--glass-bg);
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            opacity: 0;
            transition: opacity 1s ease;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .glass-container::-webkit-scrollbar {
            display: none;
        }

        #clock {
            font-size: clamp(2.5rem, 8vw, 4.2rem);
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        #date {
            font-size: 1.1rem;
            color: #fff;
            margin-top: 5px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        .main-title {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(3rem, 5vw, 1rem);
            font-weight: 600;
            color: #fff;
            letter-spacing: 2px;
            margin: 10px 0;
            text-shadow: 2px 2px 15px rgba(0, 242, 254, 0.6);
            text-transform: none;
        }

        @keyframes rainbowFlow {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        /* HÀNG NÚT NGANG 7 CỘT */
        .links-container {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            max-width: 1200px;
            margin: 15px auto;
            width: 100%;
        }

        .neon-btn {
            padding: 18px 5px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .neon-btn:hover {
            background: rgba(0, 242, 254, 0.15);
            border-color: var(--primary-color);
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
        }

        .neon-btn i {
            font-size: 1.7rem;
            margin-bottom: 10px;
            color: var(--primary-color);
            transition: 0.3s;
        }

        .neon-btn span {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* STYLE RIÊNG CHO NÚT PHƯƠNG LAN 🌹 */
        .btn-lan {
            border: 1px solid var(--rose-color) !important;
        }

        .btn-lan:hover {
            background: rgba(255, 77, 109, 0.15) !important;
            box-shadow: 0 10px 20px var(--rose-glow) !important;
            border-color: #ff85a2 !important;
        }

        .btn-lan .rose-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 5px var(--rose-color));
            animation: sway 3s ease-in-out infinite;
        }

        .btn-lan span {
            color: #ffb3c1 !important;
            text-shadow: 0 0 5px var(--rose-color);
        }

        @keyframes sway {

            0%,
            100% {
                transform: rotate(-10deg) scale(1);
            }

            50% {
                transform: rotate(15deg) scale(1.1);
            }
        }

        /* Timeline Section */
        .timeline-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .timeline-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .timeline-info div {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--warning-color);
        }

        .countdown-timer {
            font-family: 'Courier New', monospace;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.3rem;
        }

        /* Footer & Chips */
        .members-label {
            color: var(--primary-color);
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 5px;
            margin-bottom: 15px;
        }

        .member-chips {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .chip {
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            border: 1px solid var(--primary-color);
            cursor: help;
            position: relative;
            transition: 0.3s;
        }

        .chip:hover {
            background: var(--primary-color);
            color: #000;
            transform: scale(1.1);
        }

        .chip-lan-small {
            border-color: var(--rose-color) !important;
            color: #ffb3c1 !important;
        }

        .chip::after {
            content: attr(data-fullname);
            position: absolute;
            bottom: 140%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: rgba(0, 0, 0, 0.95);
            color: var(--primary-color);
            padding: 10px;
            border-radius: 10px;
            width: 180px;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 100;
            border: 1px solid var(--primary-color);
        }

        .chip:hover::after {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .links-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 650px) {
            .links-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .glass-container {
                justify-content: flex-start;
                gap: 20px;
                padding-top: 30px;
            }
        }
    </style>
</head>

<body>
    <div id="welcome-screen">
        <div id="welcome-text"></div>
    </div>

    <div class="glass-container" id="main-content">
        <div class="datetime-box">
            <div id="clock">00:00:00</div>
            <div id="date">Đang tải...</div>
        </div>

        <h1 class="main-title">BÃI TRIỀU</h1>

        <div class="links-container">
            <a href="https://meet.google.com/jhc-xicm-bfd" target="_blank" class="neon-btn"><i
                    class="fas fa-video"></i><span>Phòng Họp</span></a>
            <a href="https://drive.google.com/drive/folders/1wV8vr9x-ypkuMMQOs2wsBXIW9Oh75nHW" target="_blank"
                class="neon-btn"><i class="fas fa-server"></i><span>Tổng Kho</span></a>
            <a href="https://drive.google.com/drive/folders/1koqlxqfEJUJ6zfAIJmtKupba4QgqDnjD?usp=drive_link"
                target="_blank" class="neon-btn"><i class="fas fa-microchip"></i><span>Dự Án</span></a>
            <a href="https://docs.google.com/spreadsheets/d/1UP0lfGE331dXSViFq5ssxILgetzwBacsJvaSelRpp00/edit?gid=0#gid=0"
                target="_blank" class="neon-btn"><i class="fas fa-id-card"></i><span>Nhân Sự</span></a>
            <a href="https://docs.google.com/spreadsheets/d/1UP0lfGE331dXSViFq5ssxILgetzwBacsJvaSelRpp00/edit?gid=1750052560#gid=1750052560"
                target="_blank" class="neon-btn"><i class="fas fa-tasks"></i><span>Nhiệm Vụ</span></a>
            <a href="https://docs.google.com/document/d/1wfyrHmRsArSIpEfZJuqzwZiZwF1nXASjbAzuvtfaAzw/edit?tab=t.0"
                target="_blank" class="neon-btn"><i class="fas fa-file-alt"></i><span>Báo Cáo</span></a>

            <a href="phuonglan.html" class="neon-btn btn-lan">
                <div class="rose-icon">🌹</div>
                <span>Phương Lan</span>
            </a>
        </div>

        <div class="timeline-section">
            <div class="timeline-item">
                <div class="timeline-info">
                    <div>Thực hiện KLTN</div><span>12/03/2026 - 15/05/2026</span>
                </div>
                <div class="countdown-timer" id="timer-thuchien">--</div>
            </div>
            <div class="timeline-item">
                <div class="timeline-info">
                    <div>Nộp KLTN</div><span>16/05/2026 - 20/05/2026</span>
                </div>
                <div class="countdown-timer" id="timer-nop">--</div>
            </div>
            <div class="timeline-item">
                <div class="timeline-info">
                    <div>Bảo vệ KLTN</div><span>Từ ngày 24/05/2026</span>
                </div>
                <div class="countdown-timer" id="timer-baove">--</div>
            </div>
        </div>

        <div class="footer">
            <div class="members-label">THÀNH VIÊN ƯU TÚ</div>
            <div class="member-chips">
                <div class="chip" data-fullname="Trương Nhật Tân 28211103806">Tân</div>
                <div class="chip chip-lan-small" data-fullname="Trương Thị Phương Lan 28204404251">🌹 Lan</div>
                <div class="chip" data-fullname="Lê Đức Vinh 28211344383">Vinh</div>
                <div class="chip" data-fullname="Nguyễn Phương Tín 28211153274">Tín</div>
                <div class="chip" data-fullname="Lê Ngọc Trung 28211349462">Trung</div>
            </div>
        </div>
    </div>

    <script>
        const welcomeMessages = {
            morning: ["Chào buổi sáng rực rỡ!", "Cố lên KLTN nhé!", "Hôm nay là một ngày tuyệt vời."],
            afternoon: ["Nghỉ tay chút đi má!", "Chúc buổi chiều làm việc hiệu quả."],
            evening: ["Tối rồi, nghỉ ngơi thôi.", "Em là vì sao sáng nhất."],
            night: ["Khuya rồi, đi ngủ sớm đi nè!", "Hẹn gặp em trong mơ."]
        };

        function showWelcome() {
            const hour = new Date().getHours();
            let p = 'night';
            if (hour >= 5 && hour < 12) p = 'morning';
            else if (hour >= 12 && hour < 17) p = 'afternoon';
            else if (hour >= 17 && hour < 22) p = 'evening';
            const msg = welcomeMessages[p][Math.floor(Math.random() * welcomeMessages[p].length)];
            document.getElementById('welcome-text').innerText = msg;
            setTimeout(() => {
                document.getElementById('welcome-screen').style.opacity = '0';
                document.getElementById('main-content').style.opacity = '1';
                setTimeout(() => document.getElementById('welcome-screen').style.display = 'none', 1000);
            }, 2500);
        }

        function update() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('vi-VN', { hour12: false });
            document.getElementById('date').textContent = now.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            const deadlines = [
                { id: 'timer-thuchien', target: '2026-05-15T23:59:00' },
                { id: 'timer-nop', target: '2026-05-20T13:00:00' },
                { id: 'timer-baove', target: '2026-05-24T00:00:00' }
            ];
            deadlines.forEach(item => {
                const dist = new Date(item.target).getTime() - now.getTime();
                const el = document.getElementById(item.id);
                if (dist < 0) el.innerHTML = "ĐÃ ĐẾN HẠN";
                else {
                    const d = Math.floor(dist / 86400000);
                    const h = String(Math.floor((dist % 86400000) / 3600000)).padStart(2, '0');
                    const m = String(Math.floor((dist % 3600000) / 60000)).padStart(2, '0');
                    const s = String(Math.floor((dist % 60000) / 1000)).padStart(2, '0');
                    el.innerHTML = `${d > 0 ? d + 'n ' : ''}${h}:${m}:${s}`;
                }
            });
        }

        showWelcome();
        setInterval(update, 1000); update();
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>

</html>
