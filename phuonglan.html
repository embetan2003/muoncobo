<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Của Lan</title>
    <link rel="icon" href="logo2.png" />
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            /* Background phong cách Anime/Aesthetic cực xinh */
            background: linear-gradient(rgba(255, 230, 235, 0.3), rgba(255, 230, 235, 0.3)),
                url('https://images.unsplash.com/photo-1528459801416-a9e53bbf4e17?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Lớp phủ lấp lánh */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            pointer-events: none;
            opacity: 0.4;
            z-index: 1;
        }

        .glass-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: clamp(30px, 6vw, 50px);
            padding: clamp(30px, 5vw, 60px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px rgba(255, 182, 193, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 850px;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #clock {
            font-size: clamp(50px, 10vw, 90px);
            font-weight: 700;
            color: #ff6b81;
            text-shadow: 3px 3px 10px rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
            letter-spacing: -2px;
        }

        #date {
            font-size: clamp(14px, 2vw, 18px);
            margin-bottom: 35px;
            color: #ff8fa3;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255, 107, 129, 0.1);
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(35px, 8vw, 55px);
            color: #ff4757;
            margin-bottom: 40px;
            text-align: center;
            filter: drop-shadow(2px 2px 2px rgba(255, 255, 255, 0.5));
        }

        .button-container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px 20px;
            border-radius: 35px;
            color: #57606f;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1 1 200px;
            max-width: 240px;
            min-width: 180px;
            border: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        /* Hiệu ứng hover cho nút */
        .btn::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .btn:hover::after {
            transform: translateX(100%);
        }

        .btn:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 20px 30px rgba(255, 107, 129, 0.15);
        }

        /* Viền màu pastel xinh xắn */
        .btn-1 {
            border-top: 5px solid #ff9a9e;
        }

        .btn-2 {
            border-top: 5px solid #a1c4fd;
        }

        .btn-3 {
            border-top: 5px solid #84fab0;
        }

        .icon {
            font-size: 45px;
            margin-bottom: 12px;
            transition: transform 0.3s ease;
        }

        .btn:hover .icon {
            transform: rotate(15deg) scale(1.2);
        }

        .btn span:not(.icon) {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Hiệu ứng cánh hoa rơi nhẹ */
        .petal {
            position: fixed;
            background-color: #ffc0cb;
            border-radius: 150% 0 150% 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .btn {
                flex: 1 1 100%;
                max-width: 100%;
            }

            .glass-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="glass-container">
        <div id="clock">00:00:00</div>
        <div id="date">Đang tải...</div>

        <h1 class="title">🌷Phương Lan🌷</h1>

        <div class="button-container">
            <a href="https://docs.google.com/document/d/1wfyrHmRsArSIpEfZJuqzwZiZwF1nXASjbAzuvtfaAzw/edit"
                target="_blank" class="btn btn-1">
                <span class="icon">🌸</span>
                <span>Nhật Ký Ngày</span>
            </a>

            <a href="https://docs.google.com/spreadsheets/d/1UP0lfGE331dXSViFq5ssxILgetzwBacsJvaSelRpp00/edit?gid=1750052560#gid=1750052560"
                target="_blank" class="btn btn-2">
                <span class="icon">☁️</span>
                <span>Công Việc</span>
            </a>

            <a href="https://docs.google.com/document/d/1E3e9RX27RPNCSGQkjNgP5jEaKGJNXqXe/edit" target="_blank"
                class="btn btn-3">
                <span class="icon">🎀</span>
                <span>Ghi Chú Họp</span>
            </a>
        </div>
    </div>

    <script>
        // Cập nhật đồng hồ
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('vi-VN', { hour12: false });
            document.getElementById('clock').textContent = timeStr;

            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            const dateStr = ` ${days[now.getDay()]}, ${now.toLocaleDateString('vi-VN')} `;
            document.getElementById('date').textContent = dateStr;
        }

        // Tạo hiệu ứng cánh hoa rơi
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 10 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 3 + 7 + 's';
            petal.style.opacity = Math.random();
            document.body.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, 10000);
        }

        setInterval(updateClock, 1000);
        setInterval(createPetal, 500); // Mỗi 0.5s tạo 1 cánh hoa
        updateClock();
    </script>
</body>

</html>
